<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Interface - Fully Functional</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: #262626;
            border-right: 1px solid #404040;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #404040;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }

        .back-arrow {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #ff6b35;
            font-size: 14px;
            padding: 8px 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .new-chat-btn:hover {
            opacity: 0.8;
        }

        .plus-icon {
            width: 16px;
            height: 16px;
            background-color: #ff6b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .sidebar-nav {
            padding: 16px;
            border-bottom: 1px solid #404040;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: #b3b3b3;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #fff;
        }

        .nav-icon {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .sidebar-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 12px;
            color: #808080;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .recent-items {
            min-height: 20px;
        }

        .recent-item {
            padding: 8px 0;
            color: #b3b3b3;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-item:hover {
            color: #fff;
        }

        .empty-state {
            padding: 8px 0;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #404040;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            background-color: #ff6b35;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }

        .user-plan {
            font-size: 12px;
            color: #808080;
        }

        .chevron-down {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1a1a1a;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px;
        }

        .chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        .chat-container.active {
            display: flex;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            margin-bottom: 20px;
            height: calc(100vh - 200px);
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: #404040 #262626;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #262626;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background-color: #ff6b35;
            color: white;
        }

        .message.assistant .message-avatar {
            background-color: #4a90e2;
            color: white;
        }

        .message-content {
            max-width: 70%;
            background-color: #262626;
            border-radius: 12px;
            padding: 16px;
            color: #e5e5e5;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.assistant .message-content {
            padding: 0; /* Remove padding for container of artifacts */
        }
        .message-text-part {
            padding: 16px;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background-color: #ff6b35;
            color: white;
            padding: 16px; /* Restore padding for user messages */
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            color: #808080;
            font-style: italic;
            padding: 16px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #808080;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .greeting {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 400;
            color: #fff;
        }

        .sun-icon {
            width: 32px;
            height: 32px;
            color: #ff6b35;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 20px;
        }

        .chat-container .search-container {
            position: sticky;
            bottom: 0;
            background-color: #1a1a1a;
            padding: 20px 0;
            margin: 0;
            max-width: none;
        }

        .search-input {
            width: 100%;
            padding: 16px 120px 16px 16px;
            background-color: #262626;
            border: 1px solid #404040;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }

        .search-input:focus {
            border-color: #ff6b35;
        }

        .search-input::placeholder {
            color: #808080;
        }

        .search-actions {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }

        .search-btn {
            padding: 8px;
            background: none;
            border: none;
            color: #808080;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #404040;
        }

        .send-btn {
            padding: 8px;
            background-color: #ff6b35;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background-color: #e55a2b;
        }

        .send-btn:disabled {
            background-color: #404040;
            cursor: not-allowed;
        }

        .model-selector {
            align-self: flex-end;
            margin-bottom: 20px;
            margin-right: 60px;
        }

        .model-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .model-btn:hover {
            background-color: #262626;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background-color: #262626;
            border: 1px solid #404040;
            border-radius: 8px;
            color: #e5e5e5;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .action-btn:hover {
            background-color: #333;
            border-color: #555;
            transform: translateY(-1px);
        }

        .action-icon {
            width: 16px;
            height: 16px;
            opacity: 0.8;
        }
        
        /* Artifact Canvas Styles */
        .artifact-canvas {
            background-color: #0d0d0d;
            border: 1px solid #404040;
            border-radius: 8px;
            margin: 16px;
            overflow: hidden;
        }

        .artifact-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2a2a2a;
            padding: 8px 12px;
            border-bottom: 1px solid #404040;
        }

        .artifact-title {
            font-size: 13px;
            font-weight: 500;
            color: #b3b3b3;
        }

        .artifact-actions {
            display: flex;
            gap: 8px;
        }

        .artifact-btn {
            background: none;
            border: 1px solid #555;
            color: #b3b3b3;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .artifact-btn:hover {
            background-color: #404040;
            color: #fff;
        }
        
        .artifact-btn.view-btn {
            border-color: #4a90e2;
            color: #4a90e2;
        }
        .artifact-btn.view-btn:hover {
            background-color: #4a90e2;
            color: #fff;
        }

        .artifact-btn svg {
            width: 14px;
            height: 14px;
        }

        .artifact-code {
            padding: 12px;
            max-height: 400px;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: #404040 #1a1a1a;
        }
        
        .artifact-code pre {
            margin: 0;
        }

        .artifact-code code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            color: #e5e5e5;
            white-space: pre;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            
            .greeting {
                font-size: 24px;
            }
            
            .action-buttons {
                flex-direction: column;
                width: 100%;
            }
            
            .action-btn {
                justify-content: center;
            }
        }
    </style>
</head>

                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
                            </svg>
                            Learn
                        </button>
                        <button class="action-btn">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
                            </svg>
                            Code
                        </button>
                        <button class="action-btn">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                            </svg>
                            Life stuff
                        </button>
                        <button class="action-btn">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                            </svg>
                            Connect apps
                        </button>
                    </div>
                </div>

                <!-- Chat Container -->
                <div class="chat-container" id="chatContainer">
                    <div class="model-selector">
                        <button class="model-btn" id="modelSelector">
                            <span id="currentModelName">Claude Sonnet 4</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages"></div>
                    
                    <div class="typing-indicator" id="typingIndicator">
                        <span>Claude is thinking</span>
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                    
                    <div class="search-container">
                        <textarea class="search-input" id="chatInput" placeholder="Reply to Claude..." rows="1"></textarea>
                        <div class="search-actions">
                            <button class="search-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                                </svg>
                            </button>
                            <button class="send-btn" id="chatSendBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const availableModels = [
            { name: 'Claude Sonnet 4', apiName: 'gpt-4o' },
            { name: 'Claude Opus 3', apiName: 'gpt-4-turbo' },
            { name: 'Claude Haiku 3', apiName: 'gpt-3.5-turbo' }
        ];

        let currentModel = availableModels[0].apiName;
        let chatHistory = [];
        let recentConversations = [];
        let currentConversationId = null;
        let isStreaming = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            updateRecentItems();
            console.log('🚀 Claude Interface Initialized');
        });

        function setupEventListeners() {
            // Send buttons
            document.getElementById('sendBtn').addEventListener('click', () => handleInitialMessage());
            document.getElementById('chatSendBtn').addEventListener('click', () => handleChatMessage());
            
            // Inputs
            const welcomeInput = document.getElementById('welcomeInput');
            const chatInput = document.getElementById('chatInput');
            
            welcomeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleInitialMessage();
                }
            });
            
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleChatMessage();
                }
            });
            
            // Auto-resize textareas
            welcomeInput.addEventListener('input', () => autoResize(welcomeInput));
            chatInput.addEventListener('input', () => autoResize(chatInput));
            
            // New chat button
            document.getElementById('newChatBtn').addEventListener('click', () => startNewChat());
            
            // Model selector
            document.getElementById('modelSelector').addEventListener('click', () => toggleModel());
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function toggleModel() {
            const currentIndex = availableModels.findIndex(m => m.apiName === currentModel);
            const nextIndex = (currentIndex + 1) % availableModels.length;
            currentModel = availableModels[nextIndex].apiName;
            updateModelDisplay();
            console.log('🤖 Switched model to:', availableModels[nextIndex].name);
        }

        function updateModelDisplay() {
            const model = availableModels.find(m => m.apiName === currentModel);
            document.getElementById('currentModelName').textContent = model.name;
        }

        function handleInitialMessage() {
            const input = document.getElementById('welcomeInput');
            const message = input.value.trim();
            if (message) {
                switchToChatView();
                createNewConversation(message);
                sendMessage(message);
                input.value = '';
                autoResize(input);
            }
        }

        function handleChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message && !isStreaming) {
                sendMessage(message);
                input.value = '';
                autoResize(input);
            }
        }

        function createNewConversation(firstMessage) {
            currentConversationId = Date.now().toString();
            const title = firstMessage.length > 30 ? firstMessage.substring(0, 30) + '...' : firstMessage;
            const conversation = {
                id: currentConversationId,
                title: title,
                messages: [],
                timestamp: new Date(),
                model: currentModel
            };
            recentConversations.unshift(conversation);
            if (recentConversations.length > 10) {
                recentConversations = recentConversations.slice(0, 10);
            }
            updateRecentItems();
            console.log('📝 Created new conversation:', title);
        }

        function updateRecentItems() {
            const recentItemsContainer = document.getElementById('recentItems');
            recentItemsContainer.innerHTML = '';
            if (recentConversations.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.innerHTML = '<span style="color: #666; font-size: 13px; font-style: italic;">No recent conversations</span>';
                recentItemsContainer.appendChild(emptyDiv);
            } else {
                recentConversations.forEach(conversation => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'recent-item';
                    itemDiv.textContent = conversation.title;
                    itemDiv.addEventListener('click', () => loadConversation(conversation.id));
                    recentItemsContainer.appendChild(itemDiv);
                });
            }
        }

        function loadConversation(conversationId) {
            const conversation = recentConversations.find(conv => conv.id === conversationId);
            if (!conversation) return;
            currentConversationId = conversationId;
            chatHistory = [...conversation.messages];
            currentModel = conversation.model;
            updateModelDisplay();
            switchToChatView();
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            conversation.messages.forEach(msg => {
                addMessage(msg.content, msg.role);
            });
            document.getElementById('chatInput').focus();
            console.log('📂 Loaded conversation:', conversation.title);
        }

        function switchToChatView() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            console.log('🔄 Switched to chat view');
        }

        function startNewChat() {
            chatHistory = [];
            currentConversationId = null;
            
            // --- BUG FIX: Reset model to default on new chat ---
            currentModel = availableModels[0].apiName;
            updateModelDisplay();
            
            const welcomeScreen = document.getElementById('welcomeScreen');
            const chatContainer = document.getElementById('chatContainer');
            const chatMessages = document.getElementById('chatMessages');
            const welcomeInput = document.getElementById('welcomeInput');
            
            if (welcomeScreen) welcomeScreen.style.display = 'flex';
            if (chatContainer) chatContainer.classList.remove('active');
            if (chatMessages) chatMessages.innerHTML = '';
            if (welcomeInput) {
                welcomeInput.value = '';
                autoResize(welcomeInput);
                welcomeInput.focus();
            }
            autoResize(document.getElementById('chatInput'));
            
            console.log('🆕 Started new chat, model reset to default.');
        }

        async function sendMessage(message) {
            if (isStreaming) return;
            
            console.log('🚀 Starting to send message...');
            addMessage(message, 'user');
            showTypingIndicator();
            setInputState(false);

            // Updated system prompt integration
            if (chatHistory.length === 0) {
                chatHistory.push({ 
                    role: 'system', 
                    content: "You are Hafiz Saad's Claude AI. Always introduce yourself by saying: 'Main Hafiz Saad Sir ka AI hoon, aapki madad ke liye hamesha ready hoon.' and explain that you are designed to make daily digital needs easier." 
                });
            }

            chatHistory.push({ role: 'user', content: message });
            
            try {
                isStreaming = true;
                if (typeof puter === 'undefined') { throw new Error('Puter.js is not available.'); }
                console.log('📡 Calling Puter AI with model:', currentModel, 'and full history.');
                
                const response = await puter.ai.chat(chatHistory, {
                    model: currentModel,
                    stream: true
                });

                if (response && response.success === false) {
                    throw new Error('Authentication required. Please click the authenticate button and allow the popup.');
                }
                
                const { messageContent } = addMessage('', 'assistant');
                hideTypingIndicator();
                let fullResponse = '';
                
                for await (const part of response) {
                    if (part?.text) {
                        fullResponse += part.text;
                        renderFormattedMessage(fullResponse, messageContent);
                        scrollToBottom();
                    }
                }
                
                console.log('✅ Streaming complete.');
                renderFormattedMessage(fullResponse, messageContent); 
                
                chatHistory.push({ role: 'assistant', content: fullResponse });
                updateCurrentConversation();
                
            } catch (error) {
                console.error('❌ Error in sendMessage:', error);
                hideTypingIndicator();
                addMessage('Sorry, I encountered an error: ' + (error.message || 'Unknown error.'), 'assistant', true);
                
                if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'user') {
                    chatHistory.pop();
                }

            } finally {
                isStreaming = false;
                setInputState(true);
                document.getElementById('chatInput')?.focus();
            }
        }

        function updateCurrentConversation() {
            if (!currentConversationId) return;
            const conversation = recentConversations.find(conv => conv.id === currentConversationId);
            if (conversation) {
                conversation.messages = [...chatHistory];
                conversation.timestamp = new Date();
                const index = recentConversations.indexOf(conversation);
                if (index > 0) {
                    recentConversations.splice(index, 1);
                    recentConversations.unshift(conversation);
                    updateRecentItems();
                }
            }
        }

        function addMessage(content, role, isError = false) {
            if (role === 'system') return { messageId: null, messageContent: null };
            
            const chatMessages = document.getElementById('chatMessages');
            const messageId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.setAttribute('data-message-id', messageId);
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? 'S' : `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            if (role === 'assistant') renderFormattedMessage(content, messageContent);
            else messageContent.textContent = content;
            
            if (isError) messageContent.style.color = '#ff6b6b';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            chatMessages.appendChild(messageDiv);
            
            scrollToBottom();
            return { messageId, messageContent };
        }
        
        function renderFormattedMessage(content, container) {
            container.innerHTML = ''; // Clear previous content
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(content)) !== null) {
                if (match.index > lastIndex) {
                    const textPart = document.createElement('div');
                    textPart.className = 'message-text-part';
                    textPart.textContent = content.substring(lastIndex, match.index);
                    container.appendChild(textPart);
                }

                const [fullMatch, language, code] = match;
                container.appendChild(createArtifactCanvas(code.trim(), language || 'text'));
                lastIndex = match.index + fullMatch.length;
            }

            if (lastIndex < content.length) {
                 const textPart = document.createElement('div');
                textPart.className = 'message-text-part';
                textPart.textContent = content.substring(lastIndex);
                container.appendChild(textPart);
            }
            
            if (container.children.length === 0 && content) {
                 const textPart = document.createElement('div');
                textPart.className = 'message-text-part';
                textPart.textContent = content;
                container.appendChild(textPart);
            }
        }

        function createArtifactCanvas(code, language) {
            const canvas = document.createElement('div');
            canvas.className = 'artifact-canvas';

            const header = document.createElement('div');
            header.className = 'artifact-header';
            
            const title = document.createElement('div');
            title.className = 'artifact-title';
            title.textContent = language ? `${language} code` : 'Code Artifact';
            
            const actions = document.createElement('div');
            actions.className = 'artifact-actions';

            if (language.toLowerCase() === 'html') {
                const viewBtn = document.createElement('button');
                viewBtn.className = 'artifact-btn view-btn';
                viewBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> View`;
                viewBtn.onclick = () => {
                    const blob = new Blob([code], { type: 'text/html' });
                    window.open(URL.createObjectURL(blob), '_blank');
                };
                actions.appendChild(viewBtn);
            }
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'artifact-btn';
            const copyIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
            copyBtn.innerHTML = copyIcon;
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => { copyBtn.innerHTML = copyIcon; }, 2000);
                });
            };
            actions.appendChild(copyBtn);

            header.appendChild(title);
            header.appendChild(actions);
            canvas.appendChild(header);

            const codeContainer = document.createElement('div');
            codeContainer.className = 'artifact-code';
            const pre = document.createElement('pre');
            const codeElem = document.createElement('code');
            codeElem.textContent = code;
            pre.appendChild(codeElem);
            codeContainer.appendChild(pre);
            canvas.appendChild(codeContainer);

            return canvas;
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'flex';
            scrollToBottom();
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function setInputState(enabled) {
            document.getElementById('chatInput').disabled = !enabled;
            document.getElementById('chatSendBtn').disabled = !enabled;
        }

        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
